<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MeShop</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<style>
  * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f5f5f5;
}

.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 60px 80px;
  height: 100vh;
}

/* LEFT */
.hero-left {
  max-width: 700px;
}

.hero-left h1 {
  font-size: 60px;
  margin-bottom: 20px;
}

.hero-left p {
  font-size: 18px;
  margin-bottom: 30px;
  color: #555;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 15px;
}

.btn {
  padding: 10px 25px;
  font-size: 16px;
  cursor: pointer;
  border: none;
}

.black {
  background: black;
  color: white;
}

.outline {
  background: transparent;
  border: 1px solid black;
}

/* RIGHT */
.hero-right img {
  width: 1000px;
  max-width: 100%;
}

</style>
<nav>
      <div class="brand">
        <a href="index.html">MeShop.</a>
      </div>
      <div class="nav-items">
        <a href="index.html">Home</a>
        <a href="Login.html">Login</a>
        <a href="shop/index.html">Shop</a>
        <a href="cart/index.html">My Cart</a>
      </div>
    </nav>
  <section class="hero">
    
    <!-- LEFT -->
    <div class="hero-left">
      <h1>MeShop.</h1>
      <p>Your First Shop built on HTML, CSS AND JavaScript</p>

      <div class="buttons">
        <button class="btn black" href="/f3-project-main/Login.html">Login</button>
        <button class="btn outline" href="/f3-project-main/index.html">Signup</button>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="hero-right">
      <img src="landingPagePic.png" alt="shop illustration" />
    </div>

  </section>
  <script>
    // Add click listeners to buttons
    document.querySelector(".btn.black").addEventListener("click", function() {
      window.location.href = "/f3-project-main/Login.html";
    });

    document.querySelector(".btn.outline").addEventListener("click", function() {
      window.location.href = "/f3-project-main/index.html";
    });
  </script>
</body>
</html>
